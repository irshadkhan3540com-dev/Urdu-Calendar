name: Build Urdu Calendar App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Android Directory Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/urducalendar
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout

      - name: 4. Build Code-Driven App Icon (Chand Tara Vector)
        run: |
          cat << 'EOF' > app/src/main/res/drawable/app_icon.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="512dp"
              android:height="512dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#0F5132"
                  android:pathData="M54,54m-50,0a50,50 0,1 1,100 0a50,50 0,1 1,-100 0"/>
              <path
                  android:fillColor="#FFD700"
                  android:pathData="M65,32 C50,32 36,44 36,60 C36,76 50,88 65,88 C56,88 46,80 46,60 C46,40 56,32 65,32 Z"/>
              <path
                  android:fillColor="#FFD700"
                  android:pathData="M66,45 L68,50 L73,50 L69,53 L71,58 L66,55 L61,58 L63,53 L59,50 L64,50 Z"/>
          </vector>
          EOF

      - name: 5. Write Android App Strings & Colors
        run: |
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Urdu Calendar 2026</string>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="colorPrimary">#0F5132</color>
              <color name="colorPrimaryDark">#0A3622</color>
              <color name="colorAccent">#FFD700</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.UrduCalendar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
          </resources>
          EOF

      - name: 6. Write Full Premium 12-Month Java App (UI + Logic)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/urducalendar/MainActivity.java
          package com.zeeshan.urducalendar;

          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.time.LocalDate;
          import java.time.chrono.HijrahDate;
          import java.time.temporal.ChronoField;

          public class MainActivity extends AppCompatActivity {
              private int hijriOffset = 0; 
              private LinearLayout mainScrollContainer;
              private TextView offsetDisplay;

              private final String[] englishMonths = {
                  "JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE",
                  "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"
              };

              private final String[] hijriMonths = {
                  "Muharram", "Safar", "Rabi al-Awwal", "Rabi al-Thani",
                  "Jumada al-Awwal", "Jumada al-Thani", "Rajab", "Sha'ban",
                  "Ramadan", "Shawwal", "Dhu al-Qadah", "Dhu al-Hijjah"
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // Main Layout Background (Light Poster Grey-Blue Background)
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#EBF4F6"));

                  // 👑 ROYAL HEADER BAR (Zeeshan Husain)
                  TextView headerBar = new TextView(this);
                  headerBar.setText("👑 Zeeshan Husain 👑");
                  headerBar.setBackgroundColor(Color.parseColor("#0F5132")); 
                  headerBar.setTextColor(Color.parseColor("#FFD700")); 
                  headerBar.setTextSize(24);
                  headerBar.setTypeface(null, Typeface.BOLD);
                  headerBar.setGravity(Gravity.CENTER);
                  headerBar.setPadding(0, 35, 0, 35);
                  root.addView(headerBar);

                  // 🕌 POSTER BANNER SECTION (1000028033.jpg Style)
                  LinearLayout posterBanner = new LinearLayout(this);
                  posterBanner.setOrientation(LinearLayout.VERTICAL);
                  posterBanner.setGravity(Gravity.CENTER);
                  posterBanner.setPadding(20, 40, 20, 40);
                  
                  GradientDrawable bannerBg = new GradientDrawable(
                      GradientDrawable.Orientation.TOP_BOTTOM,
                      new int[] { Color.parseColor("#0A3622"), Color.parseColor("#14532D") }
                  );
                  posterBanner.setBackground(bannerBg);

                  TextView posterTitle = new TextView(this);
                  posterTitle.setText("2026 \nاسلامک کلینڈر");
                  posterTitle.setTextColor(Color.parseColor("#FFD700"));
                  posterTitle.setTextSize(32);
                  posterTitle.setGravity(Gravity.CENTER);
                  posterTitle.setTypeface(null, Typeface.BOLD);
                  posterBanner.addView(posterTitle);

                  TextView posterSub = new TextView(this);
                  posterSub.setText("ISLAMIC CALENDAR • 1447-48 HIJRI");
                  posterSub.setTextColor(Color.WHITE);
                  posterSub.setTextSize(14);
                  posterSub.setGravity(Gravity.CENTER);
                  posterSub.setPadding(0, 10, 0, 0);
                  posterBanner.addView(posterSub);
                  root.addView(posterBanner);

                  // 🌙 CHAND MOON ADJUSTMENT PANEL
                  LinearLayout offsetPanel = new LinearLayout(this);
                  offsetPanel.setOrientation(LinearLayout.HORIZONTAL);
                  offsetPanel.setGravity(Gravity.CENTER);
                  offsetPanel.setBackgroundColor(Color.parseColor("#FFFFFF"));
                  offsetPanel.setPadding(10, 15, 10, 15);

                  Button minusOffset = new Button(this);
                  minusOffset.setText("🌙 -1 Din");
                  minusOffset.setBackgroundColor(Color.parseColor("#E2E8F0"));
                  minusOffset.setTextColor(Color.BLACK);
                  minusOffset.setOnClickListener(v -> { hijriOffset--; renderAllMonths(); });

                  offsetDisplay = new TextView(this);
                  offsetDisplay.setTextColor(Color.parseColor("#1A202C"));
                  offsetDisplay.setTextSize(15);
                  offsetDisplay.setTypeface(null, Typeface.BOLD);
                  offsetDisplay.setPadding(40, 0, 40, 0);

                  Button plusOffset = new Button(this);
                  plusOffset.setText("🌙 +1 Din");
                  plusOffset.setBackgroundColor(Color.parseColor("#E2E8F0"));
                  plusOffset.setTextColor(Color.BLACK);
                  plusOffset.setOnClickListener(v -> { hijriOffset++; renderAllMonths(); });

                  offsetPanel.addView(minusOffset);
                  offsetPanel.addView(offsetDisplay);
                  offsetPanel.addView(plusOffset);
                  root.addView(offsetPanel);

                  // SCROLLVIEW TO HOLD ALL 12 MONTH BLOCKS
                  ScrollView mainScrollView = new ScrollView(this);
                  mainScrollContainer = new LinearLayout(this);
                  mainScrollContainer.setOrientation(LinearLayout.VERTICAL);
                  mainScrollContainer.setPadding(20, 20, 20, 40);
                  mainScrollView.addView(mainScrollContainer);
                  root.addView(mainScrollView);

                  setContentView(root);
                  renderAllMonths();
              }

              private void renderAllMonths() {
                  mainScrollContainer.removeAllViews();
                  offsetDisplay.setText("Chand Adjust: " + (hijriOffset >= 0 ? "+" : "") + hijriOffset);

                  // LOOP THROUGH 12 MONTHS FOR THE YEAR 2026
                  for (int m = 1; m <= 12; m++) {
                      mainScrollContainer.addView(createMonthCard(2026, m));
                  }
              }

              private View createMonthCard(int year, int month) {
                  // Outer Card Container
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  
                  LinearLayout.LayoutParams cardParams = new LinearLayout.LayoutParams(-1, -2);
                  cardParams.setMargins(0, 0, 0, 30);
                  card.setLayoutParams(cardParams);

                  GradientDrawable cardBg = new GradientDrawable();
                  cardBg.setColor(Color.WHITE);
                  cardBg.setCornerRadius(18f);
                  cardBg.setStroke(4, Color.parseColor("#0F5132"));
                  card.setBackground(cardBg);

                  // Fetch Header Details Dynamically
                  LocalDate firstDay = LocalDate.of(year, month, 1);
                  LocalDate midDay = LocalDate.of(year, month, 15);
                  HijrahDate hijriMid = HijrahDate.from(midDay.plusDays(hijriOffset));
                  int hMonthIdx = hijriMid.get(ChronoField.MONTH_OF_YEAR) - 1;
                  String hMonthName = (hMonthIdx >= 0 && hMonthIdx < 12) ? hijriMonths[hMonthIdx] : "Islamic";
                  String currentHijriYear = String.valueOf(hijriMid.get(ChronoField.YEAR_OF_ERA));

                  // Month Header Strip (Green/Gold Poster Design)
                  LinearLayout monthHeader = new LinearLayout(this);
                  monthHeader.setOrientation(LinearLayout.HORIZONTAL);
                  monthHeader.setBackgroundColor(Color.parseColor("#0F5132"));
                  monthHeader.setPadding(20, 20, 20, 20);

                  TextView engMonthText = new TextView(this);
                  engMonthText.setText(month + ". " + englishMonths[month - 1]);
                  engMonthText.setTextColor(Color.parseColor("#FFD700"));
                  engMonthText.setTextSize(16);
                  engMonthText.setTypeface(null, Typeface.BOLD);
                  engMonthText.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1f));

                  TextView urduMonthText = new TextView(this);
                  urduMonthText.setText(hMonthName + " " + currentHijriYear + " AH");
                  urduMonthText.setTextColor(Color.WHITE);
                  urduMonthText.setTextSize(14);
                  urduMonthText.setGravity(Gravity.RIGHT);
                  urduMonthText.setTypeface(null, Typeface.BOLD);

                  monthHeader.addView(engMonthText);
                  monthHeader.addView(urduMonthText);
                  card.addView(monthHeader);

                  // Weekdays Row (Poster Style: Sunday Red, others Dark Green)
                  TableLayout weekdayTable = new TableLayout(this);
                  TableRow weekdayRow = new TableRow(this);
                  weekdayRow.setPadding(0, 15, 0, 15);
                  
                  String[] days = {"SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"};
                  for (int i = 0; i < days.length; i++) {
                      TextView tv = new TextView(this);
                      tv.setText(days[i]);
                      tv.setTextSize(12);
                      tv.setGravity(Gravity.CENTER);
                      tv.setTypeface(null, Typeface.BOLD);
                      if (i == 0) {
                          tv.setTextColor(Color.parseColor("#D32F2F")); // Poster Highlight Sunday
                      } else {
                          tv.setTextColor(Color.parseColor("#0A3622"));
                      }
                      weekdayRow.addView(tv, new TableRow.LayoutParams(0, -2, 1f));
                  }
                  weekdayTable.addView(weekdayRow);
                  card.addView(weekdayTable);

                  // Divider Line
                  View div = new View(this);
                  div.setLayoutParams(new LinearLayout.LayoutParams(-1, 2));
                  div.setBackgroundColor(Color.parseColor("#E2E8F0"));
                  card.addView(div);

                  // Days Grid Table
                  TableLayout daysGrid = new TableLayout(this);
                  daysGrid.setPadding(10, 15, 10, 15);

                  int totalDays = firstDay.lengthOfMonth();
                  int dayOfWeekValue = firstDay.getDayOfWeek().getValue() % 7; // Convert to Sun=0, Mon=1...

                  TableRow currentRow = new TableRow(this);

                  // Add Empty cells for padding start of month
                  for (int i = 0; i < dayOfWeekValue; i++) {
                      TextView empty = new TextView(this);
                      currentRow.addView(empty, new TableRow.LayoutParams(0, -2, 1f));
                  }

                  // Render Days Loop
                  for (int day = 1; day <= totalDays; day++) {
                      LocalDate loopDate = LocalDate.of(year, month, day);
                      HijrahDate hDate = HijrahDate.from(loopDate.plusDays(hijriOffset));

                      int hDay = hDate.get(ChronoField.DAY_OF_MONTH);
                      int hMon = hDate.get(ChronoField.MONTH_OF_YEAR);

                      // Single Day Container Cell
                      LinearLayout cell = new LinearLayout(this);
                      cell.setOrientation(LinearLayout.VERTICAL);
                      cell.setGravity(Gravity.CENTER);
                      cell.setPadding(5, 12, 5, 12);

                      // Highlight Current Today's Date dynamically
                      if (loopDate.equals(LocalDate.now())) {
                          GradientDrawable todayBg = new GradientDrawable();
                          todayBg.setColor(Color.parseColor("#FEF08A")); // Soft Gold Highlight
                          todayBg.setCornerRadius(10f);
                          cell.setBackground(todayBg);
                      }

                      // Highlight Important Islamic Festival Background
                      String festivalName = checkIslamicFestival(hDay, hMon);
                      if (!festivalName.isEmpty()) {
                          GradientDrawable festBg = new GradientDrawable();
                          festBg.setColor(Color.parseColor("#DCFCE7")); // Emerald Light Green
                          festBg.setCornerRadius(10f);
                          festBg.setStroke(2, Color.parseColor("#22C55E"));
                          cell.setBackground(festBg);
                      }

                      // English Date Display
                      TextView engDayTv = new TextView(this);
                      engDayTv.setText(String.valueOf(day));
                      engDayTv.setTextSize(16);
                      engDayTv.setTypeface(null, Typeface.BOLD);
                      
                      // Check if it is a Sunday
                      int currentColumn = (day + dayOfWeekValue - 1) % 7;
                      if (currentColumn == 0) {
                          engDayTv.setTextColor(Color.parseColor("#D32F2F")); // Red Sunday Numbers
                      } else {
                          engDayTv.setTextColor(Color.parseColor("#1E293B"));
                      }
                      cell.addView(engDayTv);

                      // Hijri Arabic/Urdu Date Display Below
                      TextView urduDayTv = new TextView(this);
                      urduDayTv.setText(String.valueOf(hDay));
                      urduDayTv.setTextSize(11);
                      if (!festivalName.isEmpty()) {
                          urduDayTv.setTextColor(Color.parseColor("#15803D"));
                          urduDayTv.setTypeface(null, Typeface.BOLD);
                      } else if (currentColumn == 0) {
                          urduDayTv.setTextColor(Color.parseColor("#EF4444"));
                      } else {
                          urduDayTv.setTextColor(Color.parseColor("#64748B"));
                      }
                      cell.addView(urduDayTv);

                      currentRow.addView(cell, new TableRow.LayoutParams(0, -2, 1f));

                      // Wrap rows every 7 days
                      if ((day + dayOfWeekValue) % 7 == 0 || day == totalDays) {
                          if (day == totalDays) {
                              int trailingEmptyCells = 7 - currentRow.getChildCount();
                              for (int e = 0; e < trailingEmptyCells; e++) {
                                  TextView empty = new TextView(this);
                                  currentRow.addView(empty, new TableRow.LayoutParams(0, -2, 1f));
                              }
                          }
                          daysGrid.addView(currentRow);
                          currentRow = new TableRow(this);
                      }
                  }
                  card.addView(daysGrid);

                  // Month Special Festivals Footer Note (if any)
                  StringBuilder monthFestivals = new StringBuilder();
                  for (int day = 1; day <= totalDays; day++) {
                      LocalDate loopDate = LocalDate.of(year, month, day);
                      HijrahDate hDate = HijrahDate.from(loopDate.plusDays(hijriOffset));
                      String fest = checkIslamicFestival(hDate.get(ChronoField.DAY_OF_MONTH), hDate.get(ChronoField.MONTH_OF_YEAR));
                      if (!fest.isEmpty()) {
                          monthFestivals.append("• ").append(hDate.get(ChronoField.DAY_OF_MONTH)).append(" ").append(hijriMonths[hDate.get(ChronoField.MONTH_OF_YEAR) - 1]).append(" -> ").append(fest).append("\n");
                      }
                  }

                  if (monthFestivals.length() > 0) {
                      TextView festFooter = new TextView(this);
                      festFooter.setText(monthFestivals.toString().trim());
                      festFooter.setTextColor(Color.parseColor("#15803D"));
                      festFooter.setTextSize(12);
                      festFooter.setPadding(20, 10, 20, 20);
                      festFooter.setBackgroundColor(Color.parseColor("#F8FAFC"));
                      card.addView(festFooter);
                  }

                  return card;
              }

              private String checkIslamicFestival(int day, int month) {
                  if (month == 1 && day == 1) return "Naya Islami Saal (1st Muharram)";
                  if (month == 1 && day == 10) return "Yom-e-Ashura (10th Muharram)";
                  if (month == 3 && day == 12) return "Eid Milad-un-Nabi (12th Rabi al-Awwal)";
                  if (month == 7 && day == 27) return "Shab-e-Meraj (27th Rajab)";
                  if (month == 8 && day == 15) return "Shab-e-Barat (15th Sha'ban)";
                  if (month == 9 && day == 1) return "Pehla Roza (1st Ramadan)";
                  if (month == 9 && day == 27) return "Shab-e-Qadr (27th Ramadan)";
                  if (month == 10 && day == 1) return "Eid-ul-Fitr (1st Shawwal)";
                  if (month == 12 && day == 10) return "Eid-ul-Adha (10th Dhu al-Hijjah)";
                  return "";
              }
          }
          EOF

      - name: 7. Write App Manifest Settings
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <!-- HARDWARE & CPU ACCELERATION ENABLED FOR SMOOTH COLORFUL RENDERING -->
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/app_icon"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/app_icon"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.UrduCalendar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 8. Setup Build Automation & Dependencies
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.zeeshan.urducalendar'
              compileSdk 34

              defaultConfig {
                  applicationId "com.zeeshan.urducalendar"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 9. Compile and Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload Final Output Package
        uses: actions/upload-artifact@v4
        with:
          name: Urdu-Calendar-Poster-App
          path: app/build/outputs/apk/debug/*.apk

