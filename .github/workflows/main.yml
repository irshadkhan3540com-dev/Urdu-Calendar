          import android.os.Bundle;
          import android.util.TypedValue;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.cardview.widget.CardView;
          import java.time.DayOfWeek;
          import java.time.LocalDate;
          import java.time.chrono.HijrahDate;
          import java.time.format.TextStyle;
          import java.time.temporal.ChronoField;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {

              private int currentMonthIndex = 0; // 0 = January 2026
              private final int YEAR = 2026;
              private int hijriOffset = 0;

              private LinearLayout calendarGrid;
              private TextView monthEnglishText, monthUrduText, hijriYearBadgeText, hijriStartDayText;

              private final String[] englishMonths = {
                  "January", "February", "March", "April", "May", "June",
                  "July", "August", "September", "October", "November", "December"
              };

              private final String[] urduMonths = {
                  "Ø¬Ù†ÙˆØ±ÛŒ", "ÙØ±ÙˆØ±ÛŒ", "Ù…Ø§Ø±Ú†", "Ø§Ù¾Ø±ÛŒÙ„", "Ù…Ø¦ÛŒ", "Ø¬ÙˆÙ†",
                  "Ø¬ÙˆÙ„Ø§Ø¦ÛŒ", "Ø§Ú¯Ø³Øª", "Ø³ØªÙ…Ø¨Ø±", "Ø§Ú©ØªÙˆØ¨Ø±", "Ù†ÙˆÙ…Ø¨Ø±", "Ø¯Ø³Ù…Ø¨Ø±"
              };

              private final String[] hijriMonthsEnglish = {
                  "Muharram", "Safar", "Rabi al-Awwal", "Rabi al-Thani",
                  "Jumada al-Awwal", "Jumada al-Thani", "Rajab", "Shaban",
                  "Ramadan", "Shawwal", "Dhu al-Qadah", "Dhu al-Hijjah"
              };

              private final String[] hijriMonthsUrdu = {
                  "Ù…Ø­Ø±Ù…", "ØµÙØ±", "Ø±Ø¨ÛŒØ¹ Ø§Ù„Ø§ÙˆÙ„", "Ø±Ø¨ÛŒØ¹ Ø§Ù„Ø«Ø§Ù†ÛŒ",
                  "Ø¬Ù…Ø§Ø¯ÛŒ Ø§Ù„Ø§ÙˆÙ„", "Ø¬Ù…Ø§Ø¯ÛŒ Ø§Ù„Ø«Ø§Ù†ÛŒ", "Ø±Ø¬Ø¨", "Ø´Ø¹Ø¨Ø§Ù†",
                  "Ø±Ù…Ø¶Ø§Ù†", "Ø´ÙˆØ§Ù„", "Ø°ÙˆØ§Ù„Ù‚Ø¹Ø¯Û", "Ø°ÙˆØ§Ù„Ø­Ø¬Û"
              };

              // index 0 = Sunday ... 6 = Saturday
              private final String[] dayCodeEnglish = {"SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"};
              private final String[] dayNameUrdu     = {"Ø§ØªÙˆØ§Ø±", "Ù¾ÛŒØ±", "Ù…Ù†Ú¯Ù„", "Ø¨Ø¯Ú¾", "Ø¬Ù…Ø¹Ø±Ø§Øª", "Ø¬Ù…Ø¹Û", "Ø³Ù†ÛŒÚ†Ø±"};
              private final String[] dayNameHindi    = {"à¤°à¤µà¤¿à¤µà¤¾à¤°", "à¤¸à¥‹à¤®à¤µà¤¾à¤°", "à¤®à¤‚à¤—à¤²à¤µà¤¾à¤°", "à¤¬à¥à¤§à¤µà¤¾à¤°", "à¤—à¥à¤°à¥à¤µà¤¾à¤°", "à¤¶à¥à¤•à¥à¤°à¤µà¤¾à¤°", "à¤¶à¤¨à¤¿à¤µà¤¾à¤°"};

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#DDE3F0"));

                  root.addView(buildTitleBar());
                  root.addView(buildDateInfoBar());
                  root.addView(buildMonthBanner());

                  ScrollView scrollView = new ScrollView(this);
                  CardView gridCard = new CardView(this);
                  LinearLayout.LayoutParams gridCardParams = new LinearLayout.LayoutParams(-1, -1);
                  gridCardParams.setMargins(dp(12), dp(8), dp(12), dp(16));
                  gridCard.setLayoutParams(gridCardParams);
                  gridCard.setRadius(dp(14));
                  gridCard.setCardElevation(dp(14));
                  gridCard.setMaxCardElevation(dp(18));
                  gridCard.setCardBackgroundColor(Color.WHITE);
                  gridCard.setUseCompatPadding(true);

                  calendarGrid = new LinearLayout(this);
                  calendarGrid.setOrientation(LinearLayout.VERTICAL);
                  calendarGrid.setBackgroundResource(R.drawable.grid_panel_bg);
                  gridCard.addView(calendarGrid);
                  scrollView.addView(gridCard);

                  LinearLayout.LayoutParams scrollParams = new LinearLayout.LayoutParams(-1, 0, 1f);
                  scrollView.setLayoutParams(scrollParams);
                  root.addView(scrollView);

                  setContentView(root);
                  renderMonth();
              }

              // ===================== TOP TITLE BAR =====================
              private View buildTitleBar() {
                  LinearLayout bar = new LinearLayout(this);
                  bar.setOrientation(LinearLayout.HORIZONTAL);
                  bar.setGravity(Gravity.CENTER_VERTICAL);
                  bar.setBackgroundResource(R.drawable.title_bar_gradient_bg);
                  bar.setPadding(dp(16), dp(18), dp(16), dp(18));
                  bar.setElevation(dp(8));

                  TextView title = new TextView(this);
                  title.setText("Ø§Ø±Ø¯Ùˆ Ú©ÛŒÙ„Ù†ÚˆØ± 2026");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(20);
                  title.setTypeface(null, Typeface.BOLD);
                  title.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1f));
                  bar.addView(title);

                  TextView shareBtn = new TextView(this);
                  shareBtn.setText("SHARE");
                  shareBtn.setTextColor(Color.WHITE);
                  shareBtn.setTextSize(13);
                  shareBtn.setTypeface(null, Typeface.BOLD);
                  shareBtn.setPadding(dp(10), dp(6), dp(10), dp(6));
                  shareBtn.setOnClickListener(v -> {
                      Intent shareIntent = new Intent(Intent.ACTION_SEND);
                      shareIntent.setType("text/plain");
                      shareIntent.putExtra(Intent.EXTRA_TEXT, "Urdu Calendar 2026 - " + englishMonths[currentMonthIndex] + " " + YEAR);
                      startActivity(Intent.createChooser(shareIntent, "Share via"));
                  });
                  bar.addView(shareBtn);

                  TextView exitBtn = new TextView(this);
                  exitBtn.setText("EXIT");
                  exitBtn.setTextColor(Color.parseColor("#FFD700"));
                  exitBtn.setTextSize(13);
                  exitBtn.setTypeface(null, Typeface.BOLD);
                  exitBtn.setPadding(dp(14), dp(6), dp(0), dp(6));
                  exitBtn.setOnClickListener(v -> finish());
                  bar.addView(exitBtn);

                  return bar;
              }

              // ===================== TODAY DATE INFO BAR =====================
              private View buildDateInfoBar() {
                  LinearLayout outer = new LinearLayout(this);
                  outer.setOrientation(LinearLayout.VERTICAL);
                  outer.setBackgroundResource(R.drawable.date_nav_gradient_bg);
                  outer.setPadding(dp(16), dp(12), dp(16), dp(12));
                  outer.setElevation(dp(4));

                  LocalDate today = LocalDate.now();
                  String engDow = today.getDayOfWeek().getDisplayName(TextStyle.FULL, Locale.ENGLISH).toUpperCase();
                  String engMonShort = today.getMonth().getDisplayName(TextStyle.SHORT, Locale.ENGLISH).toUpperCase();

                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.setGravity(Gravity.CENTER_VERTICAL);

                  TextView leftArrow = makeNavArrow("\u276E");
                  leftArrow.setOnClickListener(v -> {
                      currentMonthIndex = (currentMonthIndex + 11) % 12;
                      renderMonth();
                  });
                  row.addView(leftArrow);

                  TextView dateText = new TextView(this);
                  dateText.setText(today.getDayOfMonth() + " " + engMonShort + " " + today.getYear() + "   " + engDow);
                  dateText.setTextColor(Color.parseColor("#13265A"));
                  dateText.setTextSize(15);
                  dateText.setTypeface(null, Typeface.BOLD);
                  dateText.setGravity(Gravity.CENTER);
                  dateText.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1f));
                  row.addView(dateText);

                  TextView rightArrow = makeNavArrow("\u276F");
                  rightArrow.setOnClickListener(v -> {
                      currentMonthIndex = (currentMonthIndex + 1) % 12;
                      renderMonth();
                  });
                  row.addView(rightArrow);

                  outer.addView(row);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Hijri Date Start From Jan 2026  â€¢  Use arrows to change month");
                  subtitle.setTextColor(Color.parseColor("#0F5132"));
                  subtitle.setTextSize(11);
                  subtitle.setGravity(Gravity.CENTER);
                  subtitle.setTypeface(null, Typeface.BOLD);
                  subtitle.setPadding(0, dp(6), 0, 0);
                  outer.addView(subtitle);

                  return outer;
              }

              private TextView makeNavArrow(String symbol) {
                  TextView arrow = new TextView(this);
                  arrow.setText(symbol);
                  arrow.setTextColor(Color.parseColor("#1A237E"));
                  arrow.setTextSize(18);
                  arrow.setTypeface(null, Typeface.BOLD);
                  arrow.setGravity(Gravity.CENTER);
                  arrow.setBackgroundResource(R.drawable.nav_arrow_bg);
                  arrow.setElevation(dp(4));
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(dp(38), dp(38));
                  p.setMargins(dp(8), 0, dp(8), 0);
                  arrow.setLayoutParams(p);
                  return arrow;
              }

              // ===================== MONTH / YEAR BANNER =====================
              private View buildMonthBanner() {
                  LinearLayout banner = new LinearLayout(this);
                  banner.setOrientation(LinearLayout.HORIZONTAL);
                  banner.setGravity(Gravity.CENTER_VERTICAL);
                  banner.setBackgroundResource(R.drawable.month_banner_gradient_bg);
                  banner.setPadding(dp(10), dp(14), dp(10), dp(14));
                  banner.setElevation(dp(6));

                  TextView daysTag = new TextView(this);
                  daysTag.setText("DAYS\nØ§ÛŒØ§Ù…\nà¤¦à¤¿à¤¨");
                  daysTag.setTextColor(Color.WHITE);
                  daysTag.setTextSize(11);
                  daysTag.setTypeface(null, Typeface.BOLD);
                  daysTag.setGravity(Gravity.CENTER);
                  daysTag.setBackgroundResource(R.drawable.days_tag_gradient_bg);
                  daysTag.setPadding(dp(8), dp(10), dp(8), dp(10));
                  daysTag.setElevation(dp(6));
                  LinearLayout.LayoutParams tagParams = new LinearLayout.LayoutParams(dp(70), -2);
                  daysTag.setLayoutParams(tagParams);
                  banner.addView(daysTag);

                  LinearLayout centerCol = new LinearLayout(this);
                  centerCol.setOrientation(LinearLayout.VERTICAL);
                  centerCol.setGravity(Gravity.CENTER);
                  centerCol.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1f));

                  monthEnglishText = new TextView(this);
                  monthEnglishText.setTextColor(Color.WHITE);
                  monthEnglishText.setTextSize(22);
                  monthEnglishText.setTypeface(null, Typeface.BOLD);
                  monthEnglishText.setGravity(Gravity.CENTER);
                  centerCol.addView(monthEnglishText);

                  monthUrduText = new TextView(this);
                  monthUrduText.setTextColor(Color.parseColor("#FFD700"));
                  monthUrduText.setTextSize(16);
                  monthUrduText.setTypeface(null, Typeface.BOLD);
                  monthUrduText.setGravity(Gravity.CENTER);
                  centerCol.addView(monthUrduText);

                  banner.addView(centerCol);

                  LinearLayout rightCol = new LinearLayout(this);
                  rightCol.setOrientation(LinearLayout.VERTICAL);
                  rightCol.setGravity(Gravity.CENTER);
                  rightCol.setLayoutParams(new LinearLayout.LayoutParams(dp(70), -2));

                  hijriStartDayText = new TextView(this);
                  hijriStartDayText.setTextColor(Color.WHITE);
                  hijriStartDayText.setTextSize(18);
                  hijriStartDayText.setTypeface(null, Typeface.BOLD);
                  hijriStartDayText.setGravity(Gravity.CENTER);
                  hijriStartDayText.setBackgroundResource(R.drawable.circle_badge_bg);
                  hijriStartDayText.setElevation(dp(6));
                  LinearLayout.LayoutParams badgeParams = new LinearLayout.LayoutParams(dp(46), dp(46));
                  hijriStartDayText.setLayoutParams(badgeParams);
                  rightCol.addView(hijriStartDayText);

                  hijriYearBadgeText = new TextView(this);
                  hijriYearBadgeText.setTextColor(Color.WHITE);
                  hijriYearBadgeText.setTextSize(10);
                  hijriYearBadgeText.setTypeface(null, Typeface.BOLD);
                  hijriYearBadgeText.setGravity(Gravity.CENTER);
                  hijriYearBadgeText.setPadding(0, dp(4), 0, 0);
                  rightCol.addView(hijriYearBadgeText);

                  banner.addView(rightCol);

                  return banner;
              }

              // ===================== RENDER CURRENT MONTH GRID =====================
              private void renderMonth() {
                  calendarGrid.removeAllViews();

                  int month = currentMonthIndex + 1;
                  LocalDate firstDay = LocalDate.of(YEAR, month, 1);
                  int totalDays = firstDay.lengthOfMonth();

                  HijrahDate hijriFirst = HijrahDate.from(firstDay.plusDays(hijriOffset));
                  int hMonthIdxFirst = hijriFirst.get(ChronoField.MONTH_OF_YEAR) - 1;
                  String hYearFirst = String.valueOf(hijriFirst.get(ChronoField.YEAR_OF_ERA));

                  monthEnglishText.setText(englishMonths[currentMonthIndex]);
                  monthUrduText.setText(urduMonths[currentMonthIndex] + "  " + YEAR);
                  hijriStartDayText.setText(String.valueOf(hijriFirst.get(ChronoField.DAY_OF_MONTH)));
                  hijriYearBadgeText.setText((hMonthIdxFirst >= 0 ? hijriMonthsUrdu[hMonthIdxFirst] : "") + "\n" + hYearFirst + "Ú¾");

                  // For every weekday (Sun..Sat) build one horizontal row containing
                  // every date in this month that falls on that weekday â€” exactly the
                  // layout style used in the reference calendar image.
                  for (int weekday = 0; weekday < 7; weekday++) {
                      calendarGrid.addView(buildWeekdayRow(weekday, firstDay, totalDays));
                      if (weekday < 6) {
                          View divider = new View(this);
                          divider.setLayoutParams(new LinearLayout.LayoutParams(-1, dp(1)));
                          divider.setBackgroundColor(Color.parseColor("#E3E8F5"));
                          calendarGrid.addView(divider);
                      }
                  }
              }

              private View buildWeekdayRow(int weekday, LocalDate firstDay, int totalDays) {
                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.setGravity(Gravity.CENTER_VERTICAL);
                  row.setPadding(dp(6), dp(6), dp(6), dp(6));

                  // Day-name header tag (colored exactly like the reference: Sun=red, Fri=green, rest=black)
                  TextView dayTag = new TextView(this);
                  dayTag.setText(dayCodeEnglish[weekday] + "\n" + dayNameUrdu[weekday] + "\n" + dayNameHindi[weekday]);
                  dayTag.setTextColor(Color.WHITE);
                  dayTag.setTextSize(10);
                  dayTag.setTypeface(null, Typeface.BOLD);
                  dayTag.setGravity(Gravity.CENTER);
                  dayTag.setPadding(dp(4), dp(10), dp(4), dp(10));
                  dayTag.setElevation(dp(5));
                  if (weekday == 0) {
                      dayTag.setBackgroundResource(R.drawable.row_sun_bg);
                  } else if (weekday == 5) {
                      dayTag.setBackgroundResource(R.drawable.row_fri_bg);
                  } else {
                      dayTag.setBackgroundResource(R.drawable.row_dark_bg);
                  }
                  LinearLayout.LayoutParams tagParams = new LinearLayout.LayoutParams(dp(76), dp(76));
                  tagParams.setMargins(0, 0, dp(8), 0);
                  dayTag.setLayoutParams(tagParams);
                  row.addView(dayTag);

                  HorizontalScrollView scroller = new HorizontalScrollView(this);
                  scroller.setHorizontalScrollBarEnabled(false);
                  LinearLayout cellsRow = new LinearLayout(this);
                  cellsRow.setOrientation(LinearLayout.HORIZONTAL);

                  // DayOfWeek.getValue(): Mon=1..Sun=7. Our index uses Sun=0..Sat=6.
                  for (int day = 1; day <= totalDays; day++) {
                      LocalDate loopDate = LocalDate.of(firstDay.getYear(), firstDay.getMonthValue(), day);
                      int isoVal = loopDate.getDayOfWeek().getValue() % 7; // Sun=0..Sat=6
                      if (isoVal != weekday) continue;
                      cellsRow.addView(buildDateCell(loopDate));
                  }
                  scroller.addView(cellsRow);
                  LinearLayout.LayoutParams scrollerParams = new LinearLayout.LayoutParams(0, -2, 1f);
                  scroller.setLayoutParams(scrollerParams);
                  row.addView(scroller);

                  return row;
              }

              private View buildDateCell(LocalDate loopDate) {
                  HijrahDate hDate = HijrahDate.from(loopDate.plusDays(hijriOffset));
                  int hDay = hDate.get(ChronoField.DAY_OF_MONTH);
                  int hMon = hDate.get(ChronoField.MONTH_OF_YEAR);
                  String festivalName = checkIslamicFestival(hDay, hMon);
                  boolean isToday = loopDate.equals(LocalDate.now());

                  LinearLayout cell = new LinearLayout(this);
                  cell.setOrientation(LinearLayout.VERTICAL);
                  cell.setGravity(Gravity.CENTER);
                  cell.setPadding(dp(6), dp(8), dp(6), dp(8));
                  cell.setElevation(dp(3));

                  if (isToday) {
                      cell.setBackgroundResource(R.drawable.date_cell_today_bg);
                  } else if (!festivalName.isEmpty()) {
                      cell.setBackgroundResource(R.drawable.date_cell_festival_bg);
                  } else {
                      cell.setBackgroundResource(R.drawable.date_cell_bg);
                  }

                  LinearLayout.LayoutParams cellParams = new LinearLayout.LayoutParams(dp(64), dp(70));
                  cellParams.setMargins(0, 0, dp(8), 0);
                  cell.setLayoutParams(cellParams);

                  TextView gregDay = new TextView(this);
                  gregDay.setText(String.valueOf(loopDate.getDayOfMonth()));
                  gregDay.setTextSize(18);
                  gregDay.setTypeface(null, Typeface.BOLD);
                  gregDay.setGravity(Gravity.CENTER);
                  if (loopDate.getDayOfWeek() == DayOfWeek.SUNDAY) {
                      gregDay.setTextColor(Color.parseColor("#D32F2F"));
                  } else {
                      gregDay.setTextColor(Color.parseColor("#1A1A2E"));
                  }
                  cell.addView(gregDay);

                  TextView hijriDay = new TextView(this);
                  hijriDay.setText(hDay + " " + (hMon >= 1 && hMon <= 12 ? hijriMonthsUrdu[hMon - 1] : ""));
                  hijriDay.setTextSize(9);
                  hijriDay.setGravity(Gravity.CENTER);
                  hijriDay.setTypeface(null, Typeface.BOLD);
                  hijriDay.setTextColor(!festivalName.isEmpty() ? Color.parseColor("#1B7A43") : Color.parseColor("#B23A3A"));
                  cell.addView(hijriDay);

                  if (!festivalName.isEmpty()) {
                      TextView festIcon = new TextView(this);
                      festIcon.setText("\u2606");
                      festIcon.setTextSize(11);
                      festIcon.setTextColor(Color.parseColor("#1B7A43"));
                      festIcon.setGravity(Gravity.CENTER);
                      cell.addView(festIcon);
                  }

                  return cell;
              }

              private String checkIslamicFestival(int day, int month) {
                  if (month == 1 && day == 1) return "Naya Islami Saal";
                  if (month == 1 && day == 10) return "Yom-e-Ashura";
                  if (month == 3 && day == 12) return "Eid Milad-un-Nabi";
                  if (month == 7 && day == 27) return "Shab-e-Meraj";
                  if (month == 8 && day == 15) return "Shab-e-Barat";
                  if (month == 9 && day == 1) return "Pehla Roza";
                  if (month == 9 && day == 27) return "Shab-e-Qadr";
                  if (month == 10 && day == 1) return "Eid-ul-Fitr";
                  if (month == 12 && day == 10) return "Eid-ul-Adha";
                  return "";
              }

              private int dp(int value) {
                  return (int) TypedValue.applyDimension(TypedValue.COMPLEX_UNIT_DIP, value, getResources().getDisplayMetrics());
              }
          }
          EOF

      - name: 7. Write App Manifest Settings
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/app_icon"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/app_icon"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/Theme.UrduCalendar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 8. Setup Build Automation & Dependencies
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.zeeshan.urducalendar'
              compileSdk 34

              defaultConfig {
                  applicationId "com.zeeshan.urducalendar"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.cardview:cardview:1.0.0'
          }
          EOF

      - name: 9. Compile and Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload Final Output Package
        uses: actions/upload-artifact@v4
        with:
          name: Urdu-Calendar-Poster-App
          path: app/build/outputs/apk/debug/*.apk
