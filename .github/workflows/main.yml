name: Build Urdu Calendar App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Android Directory Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/urducalendar
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout

      - name: 4. Build 3D Code-Driven App Icon (Blue Premium Vector)
        run: |
          cat << 'EOF' > app/src/main/res/drawable/app_icon.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:aapt="http://schemas.android.com/aapt"
              android:width="512dp"
              android:height="512dp"
              android:viewportWidth="108"
              android:viewportHeight="108">

              <path android:pathData="M 12,8 h 84 q 12,0 12,12 v 68 q 0,12 -12,12 h -84 q -12,0 -12,-12 v -68 q 0,-12 12,-12 z">
                  <aapt:attr name="android:fillColor">
                      <gradient
                          android:startX="54" android:startY="0"
                          android:endX="54" android:endY="108"
                          android:type="linear">
                          <item android:offset="0.0" android:color="#2868A6" />
                          <item android:offset="0.4" android:color="#144C86" />
                          <item android:offset="1.0" android:color="#062854" />
                      </gradient>
                  </aapt:attr>
              </path>

              <path android:pathData="M 12,8 h 84 q 12,0 12,12 v 30 q -54,15 -96,0 v -30 q 0,-12 12,-12 z"
                    android:fillColor="#1AFFFFFF"/>

              <path android:pathData="M 64, 20 C 32, 17 12, 47 22, 77 C 30, 97 47, 104 64, 92 C 37, 90 27, 62 32, 42 C 37, 27 47, 20 64, 20 Z"
                    android:fillColor="#40000000"/>
              <path android:pathData="M 80, 27 L 84, 37 L 95, 37 L 86, 44 L 89, 55 L 80, 48 L 71, 55 L 74, 44 L 65, 37 L 76, 37 Z"
                    android:fillColor="#40000000"/>

              <path android:pathData="M 62, 18 C 30, 15 10, 45 20, 75 C 28, 95 45, 102 62, 90 C 35, 88 25, 60 30, 40 C 35, 25 45, 18 62, 18 Z">
                  <aapt:attr name="android:fillColor">
                      <gradient
                          android:startX="20" android:startY="20"
                          android:endX="62" android:endY="90"
                          android:type="linear">
                          <item android:offset="0.0" android:color="#F7D085" />
                          <item android:offset="0.3" android:color="#C48D4B" />
                          <item android:offset="0.7" android:color="#875122" />
                          <item android:offset="1.0" android:color="#593211" />
                      </gradient>
                  </aapt:attr>
              </path>

              <path android:pathData="M 78, 25 L 82, 35 L 93, 35 L 84, 42 L 87, 53 L 78, 46 L 69, 53 L 72, 42 L 63, 35 L 74, 35 Z">
                  <aapt:attr name="android:fillColor">
                      <gradient
                          android:startX="63" android:startY="25"
                          android:endX="93" android:endY="53"
                          android:type="linear">
                          <item android:offset="0.0" android:color="#F7D085" />
                          <item android:offset="0.5" android:color="#C48D4B" />
                          <item android:offset="1.0" android:color="#593211" />
                      </gradient>
                  </aapt:attr>
              </path>
          </vector>
          EOF

      - name: 5. Write Strings, Colors & All 3D / Neumorphism Drawables
        run: |
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Ø§Ø±Ø¯Ùˆ Ú©ÛŒÙ„Ù†ÚˆØ± 2026</string>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="colorPrimary">#1A237E</color>
              <color name="colorPrimaryDark">#0D1357</color>
              <color name="colorAccent">#FFD700</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.UrduCalendar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
          </resources>
          EOF

          # Top app title bar - deep indigo glossy gradient (3D glossy strip)
          cat << 'EOF' > app/src/main/res/drawable/title_bar_gradient_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="90" android:startColor="#3949AB" android:centerColor="#283593" android:endColor="#1A237E" android:type="linear"/>
          </shape>
          EOF

          # Date navigation bar - lighter blue glossy strip beneath title
          cat << 'EOF' > app/src/main/res/drawable/date_nav_gradient_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="90" android:startColor="#FFFFFF" android:centerColor="#F3F6FF" android:endColor="#E8ECFB" android:type="linear"/>
          </shape>
          EOF

          # Month/Year banner row - royal blue 3D embossed strip
          cat << 'EOF' > app/src/main/res/drawable/month_banner_gradient_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="90" android:startColor="#2E4FA8" android:centerColor="#1E3B82" android:endColor="#13265A" android:type="linear"/>
          </shape>
          EOF

          # DAYS header tag - solid royal blue 3D box
          cat << 'EOF' > app/src/main/res/drawable/days_tag_gradient_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="135" android:startColor="#3B5FCB" android:centerColor="#22408F" android:endColor="#13265A" android:type="linear"/>
          </shape>
          EOF

          # Round red 3D badge behind the Hijri start-day number in the month banner
          cat << 'EOF' > app/src/main/res/drawable/circle_badge_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <gradient android:angle="135" android:startColor="#FF6659" android:centerColor="#E53935" android:endColor="#8E0000" android:type="linear"/>
              <stroke android:width="2dp" android:color="#FFFFFF"/>
          </shape>
          EOF

          # Sunday weekday row - glossy red 3D
          cat << 'EOF' > app/src/main/res/drawable/row_sun_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="90" android:startColor="#E53935" android:centerColor="#C62828" android:endColor="#8E0000" android:type="linear"/>
          </shape>
          EOF

          # Friday weekday row - glossy green 3D
          cat << 'EOF' > app/src/main/res/drawable/row_fri_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="90" android:startColor="#2E7D4F" android:centerColor="#0F5132" android:endColor="#06321D" android:type="linear"/>
          </shape>
          EOF

          # Mon/Tue/Wed/Thu/Sat weekday rows - glossy black 3D
          cat << 'EOF' > app/src/main/res/drawable/row_dark_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="90" android:startColor="#4A4A4A" android:centerColor="#222222" android:endColor="#000000" android:type="linear"/>
          </shape>
          EOF

          # Plain date cell - soft white 3D raised tile
          cat << 'EOF' > app/src/main/res/drawable/date_cell_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="135" android:startColor="#FFFFFF" android:centerColor="#F6F8FC" android:endColor="#E7EBF5" android:type="linear"/>
              <corners android:radius="10dp"/>
              <stroke android:width="1dp" android:color="#D7DEEE"/>
          </shape>
          EOF

          # Today date cell - golden raised 3D tile
          cat << 'EOF' > app/src/main/res/drawable/date_cell_today_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="135" android:startColor="#FFF6C8" android:centerColor="#FEE585" android:endColor="#F5C342" android:type="linear"/>
              <corners android:radius="10dp"/>
              <stroke android:width="1dp" android:color="#D49A1F"/>
          </shape>
          EOF

          # Festival date cell - emerald raised 3D tile
          cat << 'EOF' > app/src/main/res/drawable/date_cell_festival_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="135" android:startColor="#EAFBF1" android:centerColor="#BFEFD3" android:endColor="#7FD9A3" android:type="linear"/>
              <corners android:radius="10dp"/>
              <stroke android:width="1dp" android:color="#2E9E5B"/>
          </shape>
          EOF

          # Round nav arrow button - 3D circular chip
          cat << 'EOF' > app/src/main/res/drawable/nav_arrow_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <gradient android:angle="135" android:startColor="#FFFFFF" android:centerColor="#EAEFFA" android:endColor="#C9D4EE" android:type="linear"/>
              <stroke android:width="1dp" android:color="#A9B7DE"/>
          </shape>
          EOF

          # Whole calendar grid card - soft 3D panel
          cat << 'EOF' > app/src/main/res/drawable/grid_panel_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:angle="135" android:startColor="#FFFFFF" android:centerColor="#F7F9FD" android:endColor="#EDF1FA" android:type="linear"/>
              <corners android:radius="14dp"/>
          </shape>
          EOF

      - name: 6. Write Full Premium Single-Month 3D Calendar App (UI + Logic)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/urducalendar/MainActivity.java
          package com.zeeshan.urducalendar;

          import android.content.Intent;
          import android.graphics.Color;
